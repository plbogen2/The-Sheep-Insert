name: Export Models

on:
  push:
    branches: [ main ]
    paths:
      - '**.scad'
      - '**.ps1'
      - '.github/workflows/export.yml'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Install OpenSCAD (Nightly)
        run: |
          wget -qO- https://files.openscad.org/OBS-Repository-Key.pub | sudo tee /etc/apt/trusted.gpg.d/obs-openscad-nightly.asc
          echo "deb https://download.opensuse.org/repositories/home:/t-paul/xUbuntu_24.04/ ./" | sudo tee /etc/apt/sources.list.d/openscad.list
          sudo apt-get update
          sudo apt-get install -y openscad-nightly imagemagick

      - name: Create symlink for openscad
        run: sudo ln -s /usr/bin/openscad-nightly /usr/local/bin/openscad

      - name: Install Custom Fonts
        run: |
          mkdir -p ~/.local/share/fonts
          wget -qO ~/.local/share/fonts/AlfaSlabOne-Regular.ttf "https://raw.githubusercontent.com/google/fonts/main/ofl/alfaslabone/AlfaSlabOne-Regular.ttf"
          fc-cache -f -v

      - name: Get latest BIT commit hash
        id: bit-commit
        run: echo "hash=$(git ls-remote https://github.com/dppdppd/The-Boardgame-Insert-Toolkit.git HEAD | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Cache BIT Library
        id: cache-bit
        uses: actions/cache@v4
        with:
          path: boardgame_insert_toolkit_lib.4.scad
          key: bit-lib-${{ steps.bit-commit.outputs.hash }}

      - name: Download Boardgame Insert Toolkit
        if: steps.cache-bit.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/dppdppd/The-Boardgame-Insert-Toolkit.git bit_temp
          find bit_temp -name "boardgame_insert_toolkit_lib.4.scad" -exec cp {} . \;
          rm -rf bit_temp

      - name: Run Export Script (Update Baselines)
        if: contains(github.event.head_commit.message, '[update-baselines]')
        shell: pwsh
        run: ./export_sheep.ps1 -RenderPng -Test -UpdateBaselines

      - name: Run Export Script
        if: "!contains(github.event.head_commit.message, '[update-baselines]')"
        shell: pwsh
        run: ./export_sheep.ps1 -RenderPng -Test

      - name: Upload STLs as Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: Sheep-Insert-STLs
          path: STLs/*.stl

      - name: Upload PNG Previews
        uses: actions/upload-artifact@v5
        with:
          name: Sheep-Insert-PNGs
          path: PNGs/*.png

      - name: Upload Test Diff Failures
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: Visual-Regression-Diffs
          path: tests/diffs/*.png

      - name: Commit Generated Files to Repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f STLs/ PNGs/
          git add -f tests/baselines/ 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-generate STLs and PNGs [skip ci]"
          git push

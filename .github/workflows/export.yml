name: Export Models

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenSCAD (Nightly)
        run: |
          sudo snap install openscad-nightly
          sudo ln -s /snap/bin/openscad-nightly /usr/local/bin/openscad

      - name: Run Export Script
        shell: pwsh
        run: ./export_sheep.ps1 -RenderPng

      - name: Upload STLs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sheep-Insert-STLs
          path: STLs/*.stl

      - name: Upload PNG Previews
        uses: actions/upload-artifact@v4
        with:
          name: Sheep-Insert-PNGs
          path: PNGs/*.png

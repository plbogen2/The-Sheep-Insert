name: Export Models

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenSCAD (Nightly)
        run: |
          sudo apt-get install -y libfuse2
          LATEST_APPIMAGE=$(curl -s https://files.openscad.org/snapshots/ | grep -o 'href="OpenSCAD-.*x86_64\.AppImage"' | head -1 | cut -d'"' -f2)
          wget -qO openscad.AppImage "https://files.openscad.org/snapshots/$LATEST_APPIMAGE"
          chmod +x openscad.AppImage
          sudo mv openscad.AppImage /usr/local/bin/openscad

      - name: Run Export Script
        shell: pwsh
        run: ./export_sheep.ps1 -RenderPng

      - name: Upload STLs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sheep-Insert-STLs
          path: STLs/*.stl

      - name: Upload PNG Previews
        uses: actions/upload-artifact@v4
        with:
          name: Sheep-Insert-PNGs
          path: PNGs/*.png
